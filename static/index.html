<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zelda Chatbot</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="/style.css" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"
    ></script>
    <script src="/script.js"></script>
  </head>
  <body
    x-data="chatApp()"
    x-init="init()"
    :class="theme"
    class="theme-transition"
  >
    <main class="chat-shell">
      <header class="chat-header">
        <h1>The Legend of Zelda Chat</h1>
        <div class="header-action">
          <button
            class="download-btn"
            @click="downloadMarkdown"
            :disabled="messages.length === 0"
          >
            <i class="fa-solid fa-download"></i>
            <span>Download</span>
          </button>
          <button
            class="theme-toggle"
            @click="toggleTheme"
            :aria-label="theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
          >
            <i
              :class="theme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon'"
            ></i>
          </button>
        </div>
      </header>

      <section x-ref="msgEl" class="messages" id="messagesContainer">
        <template x-for="(message, index) in messages" :key="index">
          <article class="message" :class="message.role">
            <div class="bubble" x-html="renderMarkdown(message.content)"></div>
          </article>
        </template>
      </section>

      <section
        class="progress-box"
        x-show="processing || queueing"
        x-transition
      >
        <p x-text="queueing ? queueMessage : progressMessage"></p>
      </section>

      <section class="input-shell">
        <textarea
          id="chatInput"
          x-model="input"
          rows="3"
          maxlength="4000"
          placeholder="Ask about Hyrule, Link, timelines, lore..."
          @input="autoResize($event)"
          @keydown="onKeydown($event)"
        ></textarea>
        <button class="send-btn" @click="sendMessage" :disabled="!canSend">
          <i class="fa-solid fa-paper-plane"></i>
        </button>
      </section>
    </main>
  </body>
</html>
